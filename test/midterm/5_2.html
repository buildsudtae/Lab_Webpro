        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            max-width: 1200px;
            width: 100%;
            margin: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap:30px;
        }

        .allcard{
            width: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .card{
            width: 100%;
            height: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid black;
            text-align: center;
        }

        .card p{
            border-top: 1px solid black;
            width: 100%;
            padding: 10px;
            margin: 0;
        }
        img{
            object-fit: cover;
            max-width: 100%;
            width: 100%;
            height: auto;
        }

    <button onclick="random()">คำนวณเกรด</button>
    </div>
    <script>
        function random(){
            for (let i = 1; i <= 8; i++){
                let score = Math.floor(Math.random() * (100 - 40 +1))+40
                let num = document.getElementById("score"+i);
                num.innerText = score;
                let grade;
                if (80 <= score && score <= 100){
                    grade = "A";
                }
                else if (70 <= score && score <= 79){
                    grade = "B";
                }
                else if (60 <= score && score <= 69){
                    grade = "C";
                }
                else if (50 <= score && score <= 59){
                    grade = "D";
                }
                else {
                    grade = "F";
                }
                let gradecell = document.getElementById("grade"+i);
                gradecell.innerText = grade;
            }
        }
    </script>

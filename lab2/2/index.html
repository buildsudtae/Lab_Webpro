<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Scores</title>
    <style>
        .container {
            max-width: 800px;
            background: white;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 20px;
        }

        table {
            width: 70%;
        }

        thead th {
            padding: 5px 0;
            font-weight: bold;
            font-size: 18px;
            text-align: center;
        }

        tbody td {
            padding: 5px 0;
        }

        .id-col {
            width: 50px;
            text-align: left;
        }

        .student-col {
            width: 200px;
        }

        .score-col {
            width: auto;
        }

        .score-bar-container {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .score-bar {
            height: 35px;
            display: flex;
            align-items: center;
            padding-left: 10px;
            color: white;
            font-weight: bold;
            transition: width 0.3s ease;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Student Scores</h1>
        <table>
            <thead>
                <tr>
                    <th class="id-col">ID</th>
                    <th class="student-col">Student</th>
                    <th class="score-col">Score</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>Nancy Freehafer</td>
                    <td>
                        <div class="score-bar-container">
                            <div class="score-bar" style="width: 98%; background: #808080">
                                98
                            </div>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Andrew Cencini</td>
                    <td>
                        <div class="score-bar-container">
                            <div class="score-bar" style="width: 75%; background: #0000ff">
                                75
                            </div>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td>3</td>
                    <td>Jan Kotas</td>
                    <td>
                        <div class="score-bar-container">
                            <div class="score-bar" style="width: 65%; background: #00b050">
                                65
                            </div>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td>4</td>
                    <td>Mariya Sergienko</td>
                    <td>
                        <div class="score-bar-container">
                            <div class="score-bar" style="width: 72%; background: #a64d79">
                                72
                            </div>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td>5</td>
                    <td>Steven Thorpe</td>
                    <td>
                        <div class="score-bar-container">
                            <div class="score-bar" style="width: 33%; background: #ff0000">
                                33
                            </div>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>

</html>

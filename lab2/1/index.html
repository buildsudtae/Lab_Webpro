    <title>Food Menu</title>
    <style>
        body {
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background: #1a1a1a;
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .card-header {
            padding: 20px;
            background: #000;
        }

        .card-title {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .card-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            padding: 20px;
            background-color: #000;
        }

        .card-body {
            padding: 20px;
            background: #1a1a1a;
        }
    </style>
</head>
